spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: ${DATABASE_USERNAME:attendance}
    password: ${DATABASE_PASSWORD:attendance}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-development-only-change-in-production-please}
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

server:
  port: 8080
